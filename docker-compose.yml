version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gwq_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: worker_queue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gwq_network

  redis:
    image: redis:7-alpine
    container_name: gwq_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gwq_network

volumes:
  postgres_data:
  redis_data:

networks:
  gwq_network:
    driver: bridge
